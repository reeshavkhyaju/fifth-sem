<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="flex w-full h-screen items-center justify-center">
        <form action="#" class="flex flex-col w-[500px] gap-[50px]">
            <div class="flex flex-col">
                <label for="username">User Name</label>
                <input class="border border-[#000000] px-[10px]" type="text" name="username" id="username" placeholder="Enter Username">
                <p id="username-error" class="text-red-700"></p>
            </div>
            <div class="flex flex-col">
                <label for="email">User Email</label>
                <input class="border border-[#000000] px-[10px]" type="email" name="email" id="email" placeholder="Enter Email">
                <p id="email-error" class="text-red-700"></p>
            </div>
            <div class="flex flex-col">
                <label for="password">User Password</label>
                <input class="border border-[#000000] px-[10px]" type="password" name="password" id="password" placeholder="Enter Password">
                <p id="password-error" class="text-red-700"></p>
            </div>
            <div class="flex flex-col">
                <label for="confirm-password">Confirm Password</label>
                <input class="border border-[#000000] px-[10px]" type="password" name="confirm-password" id="confirm-password" placeholder="Enter Password">
                <p id="confirm-password-error" class="text-red-700"></p>
            </div>
            <button class="border border-[#000000] px-[10px] bg-blue-500" type="submit" id="submit-button">Submit</button>
            <p id="form-message" class="text-green-700 mt-2"></p>
        </form>

        <script src="./password.js"></script>
    </div>
</body>
</html>
