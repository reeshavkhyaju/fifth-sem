<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>To‑Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <h1>To‑Do List</h1>
        <form id="task-form">
            <input id="text-input" placeholder="Add a task and press Enter or Add" autocomplete="off" />
            <button id="submit" type="submit">Add</button>
        </form>
        <ul id="taskList"></ul>
        <p class="small">Tasks are saved locally in your browser.</p>
    </div>

    <script src="to-do-list.js" defer></script>
</body>
</html>
